<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — VO and Visual Extractor</title>
  <link rel="icon" type="image/avif" href="/static/favicon.avif">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&family=Geist:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-mark">VS</div>
      <div>
        <h1>VO and Visual Extractor</h1>
        <p>Sign in with your <strong>@nbmediaproductions.com</strong> Google account</p>
      </div>
    </div>

    <div id="login-error" class="login-error" hidden></div>

    <a href="/login" class="btn-primary google-signin-btn" id="google-btn">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true" style="margin-right:10px;flex:none">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.1l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.8 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.1z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2 1.5-4.6 2.4-7.2 2.4-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.6 39.6 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.7l6.2 5.2C40.7 35.4 44 30.1 44 24c0-1.3-.1-2.4-.4-3.5z"/>
      </svg>
      Sign in with Google
    </a>

    <p class="login-foot">Powered by Vertex AI Gemini · Workspace SSO</p>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const err = params.get('error');
      if (err) {
        const el = document.getElementById('login-error');
        el.textContent = decodeURIComponent(err.replace(/\+/g, ' '));
        el.hidden = false;
      }
    })();
  </script>
</body>
</html>
